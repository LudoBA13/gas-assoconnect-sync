<!DOCTYPE html>
<html>
	<head>
		<base target="_top">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	</head>
	<body>
		<main class="container">
			<p>Cette fonction permet d'importer les données <?= importerType ?> en provenance de AssoConnect pour les mettre à jour dans ce document.</p>
			<form onsubmit="event.preventDefault(); upload();">
				<label for="file">Fichier AssoConnect XLSX</label>
				<input type="file" id="file" name="file" accept=".xlsx, .xls" required>
				<button type="submit">Mettre à jour</button>
			</form>
			<div id="status"></div>
		</main>
		<script>
			function upload()
			{
				const fileInput = document.getElementById('file');
				const file = fileInput.files[0];

				if (!file)
				{
					return;
				}

				document.getElementById('status').innerHTML = '<progress indeterminate></progress>';
				resize();

				const reader = new FileReader;
				reader.onload = function (e)
				{
					const dataUrl = e.target.result;
					const data = dataUrl.split(',')[1];
					const fileData = {
						name: file.name,
						mimeType: file.type,
						data: data
					};

					google.script.run
						.withSuccessHandler(onSuccess)
						.withFailureHandler(onFailure)
						.processUploadedFile(fileData, <?= importerType ?>);
				};
				reader.readAsDataURL(file);
			}

			function onSuccess()
			{
				google.script.host.close();
			}

			function onFailure(error)
			{
				document.getElementById('status').innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
				resize();
			}

			function resize()
			{
				const height = document.body.scrollHeight + 10;
				google.script.host.setHeight(height);
			}

			window.onload = resize;
		</script>
	</body>
</html>
